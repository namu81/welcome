<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBSA 공용장비사용실 사용일지</title>
</head>
<body style="text-align: center; padding: 50px; font-family: sans-serif; background-color: #f9f9f9;">
  <h1>GBSA 공용장비사용실 사용일지</h1>
  <p>사용기록을 남겨주세요</p>
  
  <input type="text" id="messageInput" placeholder="메시지를 입력하세요" style="padding: 12px; width: 250px; border: 1px solid #ddd; border-radius: 5px;">
  <button onclick="saveMessage()" style="padding: 12px 20px; background-color: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer;">저장하기</button>

  <div id="messageList" style="margin-top: 40px; max-width: 400px; margin-left: auto; margin-right: auto; text-align: left; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h3 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">사용기록 대장</h3>
    <div id="displayArea">불러오는 중...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://sxuewadydnbhyzvnelvn.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4dWV3YWR5ZG5iaHl6dm5lbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjA1NTIsImV4cCI6MjA5Nzg5NjU1Mn0.PzptS0JsU1JDOKiyIEhFwQ3x5MwPMid_qz1ALWABmU4';

    window.onload = displayMessages;

    async function saveMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value;
      if (!content) return;

      await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ content: content })
      });

      input.value = '';
      displayMessages();
    }

    async function displayMessages() {
      const displayArea = document.getElementById('displayArea');
      
      const response = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      const data = await response.json();

      if (data.length === 0) {
        displayArea.innerHTML = '<p style="color: #999;">첫 메시지를 남겨보세요!</p>';
      } else {
        displayArea.innerHTML = data.map(m => {
          // 시간 형식을 [YYYY-MM.DD] HH:mm 으로 변환
          const d = new Date(m.created_at);
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          const hours = String(d.getHours()).padStart(2, '0');
          const minutes = String(d.getMinutes()).padStart(2, '0');
          
          const formattedTime = `[${year}-${month}.${day}] ${hours}:${minutes}`;

          return `
            <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
              <span style="font-size: 0.9em; color: #333;">${formattedTime} ${m.content}</span>
            </div>
          `;
        }).join('');
      }
    }
  </script>
</body>
</html>
  </script>
</body>
</html>
