<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBSA 공용장비사용실 사용일지</title>
</head>
<body style="text-align: center; padding: 20px; font-family: sans-serif; background-color: #f9f9f9;">
  <h1>GBSA 공용장비사용실 사용일지</h1>
  
  <!-- 입력 양식 부분 -->
  <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto 30px auto; text-align: left;">
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-size: 0.9em; margin-bottom: 5px;">1. 사용기업명</label>
      <input type="text" id="company" style="width: 94%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-size: 0.9em; margin-bottom: 5px;">2. 사용자</label>
      <input type="text" id="userName" style="width: 94%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-size: 0.9em; margin-bottom: 5px;">3. 비고</label>
      <input type="text" id="note" style="width: 94%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    <div style="margin-bottom: 15px;">
      <label style="display: block; font-size: 0.9em; margin-bottom: 5px;">4. 구분</label>
      <input type="radio" name="type" value="시작" id="start" checked> <label for="start">사용시작</label>
      <input type="radio" name="type" value="종료" id="end" style="margin-left: 20px;"> <label for="end">사용종료</label>
    </div>
    <button onclick="saveLog()" style="width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">기록 저장하기</button>
  </div>

  <!-- 기록 목록 부분 -->
  <div id="logList" style="max-width: 500px; margin: 0 auto; text-align: left; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h3 style="border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0;">최근 사용 기록</h3>
    <div id="displayArea">불러오는 중...</div>
  </div>

  <script>
    // Supabase 설정
    const SUPABASE_URL = 'https://sxuewadydnbhyzvnelvn.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4dWV3YWR5ZG5iaHl6dm5lbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjA1NTIsImV4cCI6MjA5Nzg5NjU1Mn0.PzptS0JsU1JDOKiyIEhFwQ3x5MwPMid_qz1ALWABmU4';

    window.onload = displayLogs;

    // 데이터 저장 함수
    async function saveLog() {
      const company = document.getElementById('company').value;
      const userName = document.getElementById('userName').value;
      const note = document.getElementById('note').value;
      const type = document.querySelector('input[name="type"]:checked').value;

      if (!company || !userName) {
        alert('기업명과 사용자를 입력해주세요.');
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ 
            company: company, 
            user_name: userName, 
            note: note, 
            type: type 
          })
        });

        if (response.ok) {
          alert('저장 성공!');
          document.getElementById('company').value = '';
          document.getElementById('userName').value = '';
          document.getElementById('note').value = '';
          displayLogs();
        } else {
          const errorData = await response.json();
          alert('저장 실패: ' + errorData.message);
        }
      } catch (err) {
        alert('네트워크 에러가 발생했습니다.');
      }
    }

    // 데이터 불러오기 함수
    async function displayLogs() {
      const displayArea = document.getElementById('displayArea');
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await response.json();

        if (data.length === 0) {
          displayArea.innerHTML = '<p style="color: #999;">기록이 없습니다.</p>';
        } else {
          displayArea.innerHTML = data.map(m => {
            const d = new Date(m.created_at);
            const timeStr = `[${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}] ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            
            const typeColor = m.type === '시작' ? 'blue' : 'red';
            const company = m.company || '정보없음';
            const userName = m.user_name || '';
            const note = m.note || '-';

            return `
              <div style="border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9em;">
                <span style="color: #666;">${timeStr}</span> 
                <b style="color: ${typeColor};">[${m.type || '기록'}]</b> 
                <span>${company} ${userName ? '/ ' + userName : ''}</span>
                <div style="color: #888; font-size: 0.85em; margin-top: 3px;">비고: ${note}</div>
              </div>
            `;
          }).join('');
        }
      } catch (err) {
        displayArea.innerHTML = '<p style="color: red;">데이터를 불러오지 못했습니다.</p>';
      }
    }
  </script>
</body>
</html>
